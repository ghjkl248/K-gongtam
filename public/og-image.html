<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;overflow:hidden}
.wrap{text-align:center;color:#fff}
.title{font-size:80px;font-weight:700;letter-spacing:-2px;margin-bottom:8px}
.title span{color:#E24B4A}
.sub{font-size:28px;color:#aaa;margin-bottom:40px}
.gauge{position:relative;width:320px;margin:0 auto 30px}
.score{font-size:72px;font-weight:700;color:#1D9E75}
.state{font-size:24px;color:#5DCAA5;margin-top:4px}
.url{font-size:18px;color:#666;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">K<span>-공탐지수</span></div>
  <div class="sub">한국 코스피 공포·탐욕 지수</div>
  <div class="score">65</div>
  <div class="state">탐욕 · Greed</div>
  <div class="url">k-gongtam.vercel.app</div>
</div>
</body>
</html>
